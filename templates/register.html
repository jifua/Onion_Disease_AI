<!DOCTYPE html>
<html lang="id">

<head>

    <!-- META -->
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- TITLE -->
    <title>Register AI System</title>

    <!-- CSS -->
    <link rel="stylesheet"
          href="/static/style.css">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>


    <!-- BACKGROUND -->

    <div class="bg-circle circle1"></div>
    <div class="bg-circle circle2"></div>


    <!-- MAIN CONTAINER -->

    <div class="container">


        <!-- NAVBAR -->

        <nav class="top-nav">

            <div class="nav-logo">

                <img src="/static/logo.png"
                     class="navbar-logo">

            </div>

            <div class="nav-links">

                <a href="/">
                    <i class="fas fa-home"></i>
                    Home
                </a>

                <a href="/login">
                    <i class="fas fa-right-to-bracket"></i>
                    Login
                </a>

            </div>

        </nav>



        <!-- REGISTER SECTION -->

        <section class="auth-section">

            <div class="auth-card">


                <!-- ICON -->

                <div class="auth-icon">

                    <i class="fas fa-user-plus"></i>

                </div>



                <!-- TITLE -->

                <h1>

                    Register AI System

                </h1>



                <!-- DESCRIPTION -->

                <p class="auth-description">

                    Buat akun untuk mengakses
                    sistem Artificial Intelligence
                    deteksi penyakit daun bawang merah.

                </p>



                <!-- FORM -->

                <form action="/register"
                      method="post"
                      class="auth-form">


                    <!-- FULL NAME -->

                    <div class="input-box">

                        <i class="fas fa-user"></i>

                        <input type="text"
                               name="fullname"
                               placeholder="Nama Lengkap"
                               required>

                    </div>



                    <!-- EMAIL -->

                    <div class="input-box">

                        <i class="fas fa-envelope"></i>

                        <input type="email"
                               name="email"
                               placeholder="Alamat Email"
                               required>

                    </div>



                    <!-- USERNAME -->

                    <div class="input-box">

                        <i class="fas fa-at"></i>

                        <input type="text"
                               name="username"
                               placeholder="Username"
                               required>

                    </div>



                    <!-- PASSWORD -->

                    <div class="input-box">

                        <i class="fas fa-lock"></i>

                        <input type="password"
                               name="password"
                               placeholder="Password"
                               required>

                    </div>



                    <!-- CONFIRM PASSWORD -->

                    <div class="input-box">

                        <i class="fas fa-shield-halved"></i>

                        <input type="password"
                               name="confirm_password"
                               placeholder="Konfirmasi Password"
                               required>

                    </div>



                    <!-- BUTTON -->

                    <button type="submit"
                            class="auth-btn">

                        <i class="fas fa-user-plus"></i>

                        Register Sekarang

                    </button>

                </form>



                <!-- LOGIN LINK -->

                <div class="auth-link">

                    Sudah punya akun?

                    <a href="/login">

                        Login di sini

                    </a>

                </div>

            </div>

        </section>



        <!-- FOOTER -->

        <footer class="footer">

            <i class="fas fa-brain"></i>

            Onion Disease Detection AI • Register System

        </footer>

    </div>

</body>

</html>
