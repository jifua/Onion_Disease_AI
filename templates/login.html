<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login AI</title>

    <link rel="stylesheet"
          href="/static/style.css">

</head>

<body>

<div class="auth-container">

    <form method="POST"
          action="/login"
          class="auth-card">

        <h1>Login AI System</h1>

        {% if error %}

        <div class="error-box">

            {{ error }}

        </div>

        {% endif %}

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">

            Login

        </button>

        <a href="/register">

            Belum punya akun?

        </a>

    </form>

</div>

</body>
</html>
